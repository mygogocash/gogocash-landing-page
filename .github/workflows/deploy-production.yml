name: Deploy landing page to Cloudflare production

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: landing-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: landing-production
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://gogocash.co' }}
      NEXT_PUBLIC_ANALYTICS_ENABLED: ${{ vars.NEXT_PUBLIC_ANALYTICS_ENABLED }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      NEXT_PUBLIC_LINE_TAG_ID: ${{ vars.NEXT_PUBLIC_LINE_TAG_ID || 'd27ab1a2-5e67-48d0-af8d-ca6b30b67452' }}
      NEXT_PUBLIC_LINE_TAG_ENABLED: ${{ vars.NEXT_PUBLIC_LINE_TAG_ENABLED }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
      NEXT_PUBLIC_POSTHOG_UI_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_UI_HOST }}
      NEXT_PUBLIC_POSTHOG_ENABLED: ${{ vars.NEXT_PUBLIC_POSTHOG_ENABLED }}
      NEXT_PUBLIC_MIXPANEL_TOKEN: ${{ vars.NEXT_PUBLIC_MIXPANEL_TOKEN || 'd97bbf4f9cd7512b562b6f0ddc723c4b' }}
      NEXT_PUBLIC_MIXPANEL_ENABLED: ${{ vars.NEXT_PUBLIC_MIXPANEL_ENABLED }}
      NEXT_PUBLIC_MIXPANEL_API_HOST: ${{ vars.NEXT_PUBLIC_MIXPANEL_API_HOST }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --force
      - name: Verify source
        run: npm run lint && npm run test && npm run typecheck
      - name: Build static export
        run: npm run build
        env:
          INVOLVE_ASIA_API_KEY: ${{ secrets.INVOLVE_ASIA_API_KEY }}
          INVOLVE_ASIA_API_SECRET: ${{ secrets.INVOLVE_ASIA_API_SECRET }}
          INVOLVE_ASIA_MAX_OFFER_PAGES: ${{ vars.INVOLVE_ASIA_MAX_OFFER_PAGES }}
          STRAPI_URL: ${{ vars.STRAPI_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
      - name: Install browser runtime
        run: npm exec -- playwright install --with-deps chromium webkit
      - name: Test verified static export
        run: npm run test:e2e:ci
      - name: Validate Cloudflare API token format
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_LANDING_API_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          const token = process.env.CLOUDFLARE_API_TOKEN ?? "";
          const hasOuterWhitespace = token !== token.trim();
          const hasWhitespace = /\s/.test(token);
          const hasBearerPrefix = /^Bearer(?:\s|$)/i.test(token);
          const hasQuotes =
            token.includes('"') || token.includes("'") || token.includes("`");
          const looksJson = token.startsWith("{") || token.startsWith("[");
          const looksMasked =
            /^\*+$/.test(token) ||
            /^<redacted>$/i.test(token) ||
            /^\[(?:masked|redacted)\]$/i.test(token);
          const hasImplausibleLength = token.length < 40 || token.length > 80;

          if (
            !token ||
            hasOuterWhitespace ||
            hasWhitespace ||
            hasBearerPrefix ||
            hasQuotes ||
            looksJson ||
            looksMasked ||
            hasImplausibleLength
          ) {
            console.error(
              "CLOUDFLARE_LANDING_API_TOKEN must contain one raw Cloudflare user API token, not a header, JSON value, mask, or quoted value.",
            );
            process.exit(1);
          }
          NODE
      - name: Verify Cloudflare API token
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_LANDING_API_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          const response = await fetch(
            "https://api.cloudflare.com/client/v4/user/tokens/verify",
            {
              headers: {
                Authorization: `Bearer ${process.env.CLOUDFLARE_API_TOKEN}`,
              },
            },
          );

          let payload;
          try {
            payload = await response.json();
          } catch {
            console.error(
              `Cloudflare token verification returned HTTP ${response.status} with an invalid response.`,
            );
            process.exit(1);
          }

          if (
            !response.ok ||
            payload.success !== true ||
            payload.result?.status !== "active"
          ) {
            console.error(
              `Cloudflare token verification failed with HTTP ${response.status}.`,
            );
            process.exit(1);
          }

          console.log("Cloudflare API token is active.");
          NODE
      - name: Deploy verified artifact
        run: npm exec -- wrangler deploy --config wrangler.production.jsonc
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_LANDING_API_TOKEN }}
