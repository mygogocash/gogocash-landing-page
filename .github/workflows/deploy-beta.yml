# Build Next.js static export and deploy beta to Cloudflare Workers Static
# Assets. Beta ships from the `beta` branch.

name: Deploy Landing Page (beta)

on:
  push:
    branches:
      - beta
  workflow_dispatch:

concurrency:
  group: landing-beta-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://beta.gogocash.co
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Build static site
        run: npm run build
        env:
          INVOLVE_ASIA_API_KEY: ${{ secrets.INVOLVE_ASIA_API_KEY }}
          INVOLVE_ASIA_API_SECRET: ${{ secrets.INVOLVE_ASIA_API_SECRET }}
          STRAPI_URL: ${{ vars.STRAPI_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_POSTHOG_UI_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_UI_HOST }}
          NEXT_PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ vars.NEXT_PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
          NEXT_PUBLIC_CUSTOMERIO_FORMS_SITE_ID: ${{ vars.NEXT_PUBLIC_CUSTOMERIO_FORMS_SITE_ID || 'be2d31cfc0387c58114c' }}
          NEXT_PUBLIC_CUSTOMERIO_FORMS_BASE_URL: ${{ vars.NEXT_PUBLIC_CUSTOMERIO_FORMS_BASE_URL || 'https://customerioforms.com' }}
          NEXT_PUBLIC_NEWSLETTER_FORM_ACTION: ${{ vars.NEXT_PUBLIC_NEWSLETTER_FORM_ACTION }}
          NEXT_PUBLIC_NEWSLETTER_EMAIL_FIELD: ${{ vars.NEXT_PUBLIC_NEWSLETTER_EMAIL_FIELD }}
          NEXT_PUBLIC_NEWSLETTER_CONSENT_FIELD: ${{ vars.NEXT_PUBLIC_NEWSLETTER_CONSENT_FIELD }}
          NEXT_PUBLIC_NEWSLETTER_SOURCE_FIELD: ${{ vars.NEXT_PUBLIC_NEWSLETTER_SOURCE_FIELD }}
          NEXT_PUBLIC_NEWSLETTER_SOURCE_VALUE: ${{ vars.NEXT_PUBLIC_NEWSLETTER_SOURCE_VALUE }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: E2E static export
        run: npm run test:e2e:static-only

      - name: Deploy to Cloudflare Workers
        run: |
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::notice title=Cloudflare deploy skipped::Set repository variable CLOUDFLARE_ACCOUNT_ID and secret CLOUDFLARE_API_TOKEN to deploy from GitHub Actions."
            exit 0
          fi
          npm exec -- wrangler deploy --config wrangler.beta.jsonc
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
