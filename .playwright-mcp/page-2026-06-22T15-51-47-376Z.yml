        - generic [ref=e495]:
          - generic [ref=e496]:
            - button "How does GoGoCash cashback work?" [ref=e497]:
              - generic [ref=e498]: How does GoGoCash cashback work?
              - img [ref=e499]
            - generic [ref=e501]: You earn cashback when you start shopping from GoGoCash and the brand later confirms your order. Browse partners in the app or on the site, tap through to the merchant, check out as usual, and GoGoCash credits your wallet after confirmation so you can withdraw at the minimum shown.
          - generic [ref=e502]:
            - button "How long does cashback take to confirm?" [ref=e503]:
              - generic [ref=e504]: How long does cashback take to confirm?
              - img [ref=e505]
            - generic [ref=e507]: Most cashback confirms within 1–3 business days after the partner validates your purchase. Peak sale periods or travel bookings can take longer because the merchant confirms later.
          - generic [ref=e508]:
            - button "How do I withdraw my cashback?" [ref=e509]:
              - generic [ref=e510]: How do I withdraw my cashback?
              - img [ref=e511]
            - generic [ref=e513]: Withdraw from your GoGoCash wallet to a supported bank account or e-wallet once you meet the in-app minimum. Most payouts complete within 1–3 business days depending on the method and country.
          - generic [ref=e514]:
            - button "Is GoGoCash free to use?" [ref=e515]:
              - generic [ref=e516]: Is GoGoCash free to use?
              - img [ref=e517]
            - generic [ref=e519]: Yes — GoGoCash is free to use. There are no subscription fees or hidden platform charges; you earn cashback when you shop through eligible partner journeys.
          - generic [ref=e520]:
            - button "What is the minimum withdrawal amount on GoGoCash?" [ref=e521]:
              - generic [ref=e522]: What is the minimum withdrawal amount on GoGoCash?
              - img [ref=e523]
            - generic [ref=e525]: Your minimum withdrawal is shown inside your GoGoCash wallet and can vary by country and payout method. Once your confirmed balance meets that threshold, you can request a payout to an eligible bank or e-wallet.
          - generic [ref=e526]:
            - button "Which brands are available?" [ref=e527]:
              - generic [ref=e528]: Which brands are available?
              - img [ref=e529]
            - generic [ref=e531]: GoGoCash works with 70+ cashback partners across Southeast Asia, including Lazada, Shopee, Agoda, Samsung, and Trip.com — and the in-app brand directory keeps growing. New merchants join over time; check the app or homepage partner list for the latest lineup.
          - generic [ref=e532]:
            - button "Which brands offer the highest cashback on GoGoCash?" [ref=e533]:
              - generic [ref=e534]: Which brands offer the highest cashback on GoGoCash?
              - img [ref=e535]
            - generic [ref=e537]: The highest rates change by campaign and category. Open GoGoCash and compare the live rate on each merchant tile before you shop — that is the source of truth for your session.
          - generic [ref=e538]:
            - button "Can I use GoGoCash in Thailand, Indonesia, or Malaysia?" [ref=e539]:
              - generic [ref=e540]: Can I use GoGoCash in Thailand, Indonesia, or Malaysia?
              - img [ref=e541]
            - generic [ref=e543]: Yes — GoGoCash is available across Southeast Asia, including Thailand, Indonesia, Malaysia, Singapore, the Philippines, and Vietnam.
          - generic [ref=e544]:
            - button "What if my cashback doesn’t track?" [ref=e545]:
              - generic [ref=e546]: What if my cashback doesn’t track?
              - img [ref=e547]
            - generic [ref=e549]: First, confirm you started the whole trip from GoGoCash, kept one clean merchant tab, and disabled strict blockers during checkout. If it still fails, contact support with your order ID and screenshots so we can investigate with the partner.
          - generic [ref=e550]:
            - button "How is GoGoCash different from points programs?" [ref=e551]:
              - generic [ref=e552]: How is GoGoCash different from points programs?
              - img [ref=e553]
            - generic [ref=e555]: GoGoCash pays real cashback to your wallet instead of opaque points with confusing tiers. You see rates upfront, shop as you already do, and withdraw cash when you qualify — no mystery redemption math.
